name: Build and publish toolchain image

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner label. Use an arm64 Ubuntu runner for practical build times."
        required: true
        default: "ubuntu-24.04-arm"
      image_name:
        description: "Docker image name"
        required: true
        default: "openswiftproject/swift-gnustep-toolchain"
      image_tag:
        description: "Docker image tag"
        required: true
        default: "6.3-alpha-ubuntu24-aarch64"
      push_image:
        description: "Push to Docker Hub"
        type: boolean
        required: true
        default: false
      build_jobs:
        description: "Parallel build jobs"
        required: true
        default: "3"

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 720

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ inputs.push_image }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          docker buildx build \
            --platform linux/arm64 \
            --load \
            --build-arg BUILD_JOBS="${{ inputs.build_jobs }}" \
            --build-arg IMAGE_REVISION="${{ github.sha }}" \
            --build-arg IMAGE_CREATED="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t "$IMAGE" \
            .

      - name: Smoke test image
        run: |
          set -euo pipefail
          ./scripts/smoke-test-image.sh "${{ inputs.image_name }}:${{ inputs.image_tag }}"

      - name: Push image
        if: ${{ inputs.push_image }}
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.image_name }}:${{ inputs.image_tag }}"
          docker push "$IMAGE"
          if [[ "${{ inputs.image_tag }}" == "6.3-alpha-ubuntu24-aarch64" ]]; then
            docker tag "$IMAGE" "${{ inputs.image_name }}:6.3-alpha"
            docker push "${{ inputs.image_name }}:6.3-alpha"
          fi

